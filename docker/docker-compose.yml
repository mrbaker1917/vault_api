version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/vault_api?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vault_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
