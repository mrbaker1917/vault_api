name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Integration tests
        run: go test -tags=integration -race -count=1 ./internal/api/...

      - name: Build
        run: go build -o bin/server ./cmd/server
